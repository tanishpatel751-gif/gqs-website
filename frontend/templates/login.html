<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - GQS</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <header>
    <h1>Admin Login</h1>
  </header>

  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}{% if messages %}<div class="flashes">{% for category, message in messages %}<div class="flash {{ category }}">{{ message }}</div>{% endfor %}</div>{% endif %}{% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
      <label for="username">Username (email):</label>
      <input id="username" name="username" type="text" required>

      <label for="password">Password:</label>
      <input id="password" name="password" type="password" required>

      <button type="submit">Login</button>
    </form>

    <p>Or use HTTP Basic Auth by visiting <code>/add-item</code> directly.</p>
  </main>
</body>
</html>
