        <h1 id="Top">Contact</h1>
        <div class="contact-section">
          <p>Hello! If you have any specific questions or want to contact us for business or information please put your email down below.</p>
          <div class="contact-form">
            <form action="https://formsubmit.co/tanishpatel751@gmail.com" method="POST">
            <label for="name">Name:</label><br>
            <input type="text" id="name" name="name" required><br><br>

            <label for="phone">Phone Number:</label><br>
            <input type="tel" id="phone" name="phone"><br><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required><br><br>

            <label for="message">Message:</label><br>
            <textarea id="message" name="message" rows="4" required></textarea><br><br>

            <input type="submit" value="Submit">
        </form>
