<!DOCTYPE html> 
<html lang="en"> 
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GQS | add items</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="{{ url_for('static', filename='product.js') }}" defer></script>
</head>
  <body>
    <header>
      <h1>Welcome, {{request.authorization.username}} Add a New Product</h1>
    </header>

    <main>
      {% with messages = get_flashed_messages(with_categories=true) %}{% if messages %}<div class="flashes">{% for category, message in messages %}<div class="flash {{ category }}">{{ message }}</div>{% endfor %}</div>{% endif %}{% endwith %}
      <form id="productForm" method="POST" action="{{ url_for('add_item') }}" enctype="multipart/form-data">
           <div id="addproduct">
        <label for="productName">Product Name:</label>
        <input type="text" id="productName" name="productName" required><br>
           </div>
        <label for="productDesc">Product Description:</label>
        <textarea id="productDesc" name="productDesc" required></textarea><br>

        <label for="productImg">Product Image URL:</label>
        <input type="file" id="productImg" name="productImg" required> 
        <br>   
        <label for="productPrice">Product Price:</label>
        <input type="number" id="productPrice" name="productPrice" step="0.01" required><br>

        <button type="submit">Add Product</button>
      </form>
    </main>
  </body> 
</html>
